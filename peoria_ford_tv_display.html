<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Peoria Ford Daily Videos — Live Board</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ford-blue: #003DA5;
    --ford-blue-dark: #002a73;
    --ford-blue-light: #1a56c4;
    --gold: #C8952A;
    --gold-light: #f0b940;
    --green-light: #22a44e;
    --yellow: #d4a017;
    --red: #b91c1c;
    --bg: #0a0f1e;
    --surface: #0f1729;
    --surface2: #162040;
    --border: #1e2d52;
    --text: #e8edf5;
    --text-dim: #8a9ab8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(0,61,165,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,61,165,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .wrapper { position: relative; z-index: 1; padding: 0 0 40px; }
  .header {
    background: linear-gradient(135deg, var(--ford-blue-dark) 0%, var(--ford-blue) 60%, var(--ford-blue-light) 100%);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--gold);
    box-shadow: 0 4px 30px rgba(0,61,165,0.5);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .pat-photo {
    width: 60px; height: 60px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    border: 3px solid var(--gold);
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    flex-shrink: 0;
  }
  .header-title h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: white;
    line-height: 1;
  }
  .header-title p { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; }
  .header-right { text-align: right; }
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: white;
    margin-bottom: 4px;
  }
  .live-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .last-updated { font-size: 12px; color: rgba(255,255,255,0.6); }
  .store-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 20px 32px; }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .summary-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
  .summary-card.total::before { background: var(--gold); }
  .summary-card.on-track::before { background: var(--green-light); }
  .summary-card.warning::before { background: var(--yellow); }
  .summary-card.not-started::before { background: var(--red); }
  .summary-card .big-number { font-family:'Barlow Condensed',sans-serif; font-size:48px; font-weight:900; line-height:1; margin-bottom:4px; }
  .summary-card.total .big-number { color: var(--gold-light); }
  .summary-card.on-track .big-number { color: #4ade80; }
  .summary-card.warning .big-number { color: #fbbf24; }
  .summary-card.not-started .big-number { color: #f87171; }
  .summary-card .card-label { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); }
  .date-bar {
    margin: 0 32px 16px;
    padding: 9px 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-dim);
  }
  .date-bar strong { color: var(--text); }
  .teams-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 0 32px; }
  .team-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .team-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 9px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .team-name { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--gold-light); }
  .team-manager { font-size:11px; color:var(--text-dim); }
  .team-totals { display:flex; gap:12px; font-size:11px; color:var(--text-dim); }
  .team-totals span strong { color:var(--text); font-family:'Barlow Condensed',sans-serif; font-size:14px; }
  table.team-table { width:100%; border-collapse:collapse; font-size:13px; }
  table.team-table thead tr { background:rgba(0,61,165,0.2); border-bottom:1px solid var(--border); }
  table.team-table thead th { padding:6px 12px; text-align:left; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-dim); }
  table.team-table thead th:not(:first-child) { text-align:center; }
  table.team-table tbody tr { border-bottom:1px solid rgba(255,255,255,0.04); }
  table.team-table tbody tr:last-child { border-bottom:none; }
  table.team-table tbody td { padding:7px 12px; vertical-align:middle; }
  table.team-table tbody td:not(:first-child) { text-align:center; }
  .salesperson-name a { color:var(--text); text-decoration:none; border-bottom:1px dotted var(--ford-blue-light); }
  .count-cell { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; color:var(--text-dim); }
  .count-cell.has-videos { color:var(--text); }
  .status-icon { font-size:15px; }
  .needs-attention { margin:16px 32px 0; background:rgba(185,28,28,0.1); border:1px solid rgba(185,28,28,0.3); border-radius:10px; padding:12px 20px; }
  .needs-attention h3 { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#f87171; margin-bottom:8px; }
  .needs-attention-list { display:flex; flex-wrap:wrap; gap:6px; }
  .needs-attention-pill { background:rgba(185,28,28,0.2); border:1px solid rgba(185,28,28,0.3); border-radius:20px; padding:2px 10px; font-size:12px; color:#fca5a5; }
  .loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:20px; color:var(--text-dim); }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--ford-blue); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .refresh-bar { position:fixed; bottom:0; left:0; right:0; height:3px; background:var(--border); }
  .refresh-progress { height:100%; background:var(--ford-blue); width:0%; transition:width linear; }
</style>
</head>

const TEAM_ORDER = ['New Team A','New Team B','New Team C','New Team D','Used Team A','Used Team B','Used Team C','Internet Team A'];

async function fetchAll(tableId) {
  let records=[], offset=null;
  do {
    let url=`https://api.airtable.com/v0/${BASE_ID}/${tableId}?pageSize=100`;
    if(offset) url+=`&offset=${offset}`;
    const res=await fetch(url,{headers:{Authorization:`Bearer ${TOKEN}`}});
    const data=await res.json();
    records=records.concat(data.records||[]);
    offset=data.offset||null;
  } while(offset);
  return records;
}

function getStatus(s){ if(!s)return'❌'; if(s.includes('✅'))return'✅'; if(s.includes('⚠️'))return'⚠️'; return'❌'; }

async function loadData() {
  const [mRecs,pRecs]=await Promise.all([fetchAll(METRICS_TABLE),fetchAll(PEOPLE_TABLE)]);
  const pMap={};
  pRecs.forEach(p=>{ const n=p.fields['Official Name']||''; pMap[n]={youtubeUrl:p.fields['YouTube Channel URL']||'',team:p.fields['Team']||'Unassigned',manager:p.fields['Manager']||''}; });
  const grouped={};
  TEAM_ORDER.forEach(t=>grouped[t]=[]);
  mRecs.forEach(r=>{
    const name=r.fields['Name']||'';
    const p=pMap[name]||{};
    const team=p.team||'Unassigned';
    if(!grouped[team])grouped[team]=[];
    grouped[team].push({name,youtubeUrl:p.youtubeUrl,today:parseInt(r.fields['Today Count']||0),week:parseInt(r.fields['Week Count']||0),month:parseInt(r.fields['Month Count']||0),total:parseInt(r.fields['Total Count']||0),status:getStatus(r.fields['Status'])});
  });
  TEAM_ORDER.forEach(t=>{ if(grouped[t])grouped[t].sort((a,b)=>b.today-a.today); });
  const all=mRecs.map(r=>({today:parseInt(r.fields['Today Count']||0),status:getStatus(r.fields['Status'])}));
  const totalToday=all.reduce((s,p)=>s+p.today,0);
  const onTrack=all.filter(p=>p.status==='✅').length;
  const warning=all.filter(p=>p.status==='⚠️').length;
  const notStarted=all.filter(p=>p.status==='❌').length;
  const noPost=mRecs.filter(r=>getStatus(r.fields['Status'])==='❌').map(r=>r.fields['Name']||'');
  const now=new Date().toLocaleString('en-US',{timeZone:'America/Phoenix',weekday:'long',month:'long',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});

  let teamsHTML='';
  TEAM_ORDER.forEach(team=>{
    const members=grouped[team]||[];
    if(!members.length)return;
    const mgr=(pMap[members[0]?.name]||{}).manager||'';
    const tT=members.reduce((s,m)=>s+m.today,0);
    const tW=members.reduce((s,m)=>s+m.week,0);
    const tM=members.reduce((s,m)=>s+m.month,0);
    const rows=members.map(m=>`<tr><td class="salesperson-name">${m.youtubeUrl?`<a href="${m.youtubeUrl}" target="_blank">${m.name}</a>`:m.name}</td><td class="count-cell ${m.today>0?'has-videos':''}">${m.today}</td><td class="count-cell ${m.week>0?'has-videos':''}">${m.week}</td><td class="count-cell ${m.month>0?'has-videos':''}">${m.month}</td><td class="count-cell ${m.total>0?'has-videos':''}">${m.total}</td><td class="status-icon">${m.status}</td></tr>`).join('');
    teamsHTML+=`<div class="team-card"><div class="team-header"><div><div class="team-name">${team}</div>${mgr?`<div class="team-manager">Manager: ${mgr}</div>`:''}</div><div class="team-totals"><span>Today <strong>${tT}</strong></span><span>Week <strong>${tW}</strong></span><span>Month <strong>${tM}</strong></span></div></div><table class="team-table"><thead><tr><th>Salesperson</th><th>Today</th><th>Week</th><th>Month</th><th>Total</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  });

  const attn=noPost.length?`<div class="needs-attention"><h3>❌ Not Posted Today (${noPost.length})</h3><div class="needs-attention-list">${noPost.map(n=>`<span class="needs-attention-pill">${n}</span>`).join('')}</div></div>`:'';

  document.getElementById('mainContent').innerHTML=`
    <div class="store-summary">
      <div class="summary-card total"><div class="big-number">${totalToday}</div><div class="card-label">Videos Today</div></div>
      <div class="summary-card on-track"><div class="big-number">${onTrack}</div><div class="card-label">✅ On Goal</div></div>
      <div class="summary-card warning"><div class="big-number">${warning}</div><div class="card-label">⚠️ Below Goal</div></div>
      <div class="summary-card not-started"><div class="big-number">${notStarted}</div><div class="card-label">❌ Not Started</div></div>
    </div>
    <div class="date-bar"><span><strong>${now}</strong></span><span>Goal: 2 videos · Required: Sun–Thu · Refreshes every 60 sec</span></div>
    ${attn}
    <div class="teams-grid">${teamsHTML}</div>`;
  document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString('en-US',{timeZone:'America/Phoenix',hour:'numeric',minute:'2-digit',hour12:true})+' AZ';
}

function startProgressBar(){
  const bar=document.getElementById('refreshProgress');
  bar.style.transition='none'; bar.style.width='0%';
  setTimeout(()=>{ bar.style.transition=`width ${REFRESH_SECONDS}s linear`; bar.style.width='100%'; },50);
}

async function refresh(){ try{ await loadData(); }catch(e){ console.error('Refresh error:',e); } startProgressBar(); }
refresh();
setInterval(refresh,REFRESH_SECONDS*1000);
</script>
