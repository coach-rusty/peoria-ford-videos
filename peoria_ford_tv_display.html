<style>
:root {
  --ford-blue:#003DA5; --ford-blue-dark:#002270; --ford-blue-light:#1a56c4;
  --gold:#C8952A; --gold-light:#b8860b;
  --green:#16a34a; --green-bright:#15803d;
  --amber:#d97706; --amber-bright:#b45309;
  --red:#b91c1c; --red-bright:#991b1b;
  --bg:#f0f4f8; --surface:#ffffff; --surface2:#e8edf5; --surface3:#dde4ef;
  --border:#c8d4e8; --border2:#b0bfd8;
  --text:#0d1a2e; --text-dim:#3a5278; --text-muted:#6b82a8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,61,165,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,61,165,0.06) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
.wrapper{position:relative;z-index:1;padding-bottom:48px;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--ford-blue-dark) 0%,var(--ford-blue) 55%,var(--ford-blue-light) 100%);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);box-shadow:0 4px 32px rgba(0,30,100,0.6);}
.header-logo img{height:48px;width:auto;object-fit:contain;}
.header-center{text-align:center;flex:1;padding:0 16px;}
.header-center h1{font-family:'Bebas Neue',sans-serif;color:white;line-height:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.title-main{font-size:clamp(24px,3.5vw,40px);letter-spacing:5px;color:#ffffff;line-height:1;}
.title-sub{font-size:clamp(11px,1.6vw,18px);letter-spacing:8px;color:rgba(255,255,255,0.65);font-family:'Bebas Neue',sans-serif;line-height:1;}
.header-center p{font-size:clamp(9px,1vw,11px);color:rgba(255,255,255,0.55);margin-top:3px;letter-spacing:0.5px;}
.header-right{display:flex;align-items:center;gap:12px;}
.pat-photo{width:52px;height:52px;border-radius:50%;object-fit:cover;object-position:center top;border:2px solid var(--gold);box-shadow:0 2px 14px rgba(0,0,0,0.5);flex-shrink:0;}
.header-meta{text-align:right;}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:white;margin-bottom:3px;}
.live-dot{width:7px;height:7px;background:#4ade80;border-radius:50%;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.75)}}
.last-updated{font-size:10px;color:rgba(255,255,255,0.45);}

/* SUMMARY CARDS */
.store-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 24px 8px;}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;text-align:center;position:relative;overflow:hidden;}
.summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.summary-card.total::before{background:#003DA5;}
.summary-card.on-track::before{background:var(--green-bright);}
.summary-card.warning::before{background:var(--amber-bright);}
.summary-card.not-started::before{background:var(--red-bright);}
.big-number{font-family:'Barlow Condensed',sans-serif;font-size:clamp(36px,5vw,52px);font-weight:900;line-height:1;margin-bottom:2px;}
.summary-card.total .big-number{color:#003DA5;}
.summary-card.on-track .big-number{color:#16a34a;}
.summary-card.warning .big-number{color:#ea580c;}
.summary-card.not-started .big-number{color:#dc2626;}
.card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#3a5278;}
.card-sub{font-size:9px;color:#6b82a8;margin-top:3px;letter-spacing:0.3px;}
.week-bar-wrap{margin-top:8px;background:var(--border);border-radius:6px;height:8px;overflow:hidden;}
.week-bar{height:100%;border-radius:3px;transition:width 0.8s ease;}




/* LEADER BANNER */
.leader-banner{display:none;}






/* DATE BAR */
.date-bar{margin:0 24px 12px;padding:7px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#3a5278;flex-wrap:wrap;gap:6px;}
.date-bar strong{color:#0d1a2e;}
.goal-pills{display:flex;gap:6px;flex-wrap:wrap;}
.goal-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(0,61,165,0.1);border:1px solid rgba(0,61,165,0.3);border-radius:20px;padding:2px 9px;font-size:10px;font-weight:600;color:#003DA5;}

/* HOT LIST */
.hot-list{margin:0 24px 12px;background:rgba(185,28,28,0.07);border:1px solid rgba(185,28,28,0.2);border-radius:8px;padding:8px 16px;}
.hot-list-header{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.hot-list-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#f87171;}
.hot-pills{display:flex;flex-wrap:wrap;gap:4px;}
.hot-pill{background:rgba(185,28,28,0.15);border:1px solid rgba(185,28,28,0.25);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;color:#fca5a5;}

/* TEAMS GRID */
.teams-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 24px;}
@media(max-width:700px){.teams-grid{grid-template-columns:1fr;}.store-summary{grid-template-columns:repeat(2,1fr);}}
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.team-header{background:var(--ford-blue);border-bottom:1px solid var(--ford-blue-dark);padding:7px 12px;display:flex;align-items:center;justify-content:space-between;}
.team-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:#f0b940;}
.team-meta{font-size:9px;color:rgba(255,255,255,0.75);margin-top:1px;}
.team-totals{display:flex;gap:10px;font-size:10px;color:rgba(255,255,255,0.7);}
.team-totals span strong{color:#ffffff;font-family:'Barlow Condensed',sans-serif;font-size:12px;}

/* TABLE */
table.tt{width:100%;border-collapse:collapse;font-size:12px;} .sp-name{font-size:13px;font-weight:600;}
table.tt thead tr{background:rgba(0,61,165,0.08);border-bottom:1px solid var(--border);}
table.tt thead th{padding:4px 10px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#6b82a8;}
table.tt thead th.tc{text-align:center;}
table.tt tbody tr{border-bottom:1px solid rgba(0,40,120,0.06);transition:background 0.12s;}
table.tt tbody tr:last-child{border-bottom:none;}
table.tt tbody tr:hover{background:rgba(0,61,165,0.04);}
table.tt tbody tr.row-goal{border-left:4px solid #16a34a;background:rgba(22,163,74,0.04);}
table.tt tbody tr.row-warn{border-left:4px solid #d97706;}
table.tt tbody tr.row-miss{border-left:4px solid #dc2626;background:rgba(220,38,38,0.04);}
table.tt tbody td{padding:6px 10px;vertical-align:middle;}
table.tt tbody td.tc{text-align:center;}
.sp-name a{color:#0d1a2e;text-decoration:none;}
.sp-name a:hover{color:var(--ford-blue);}
.sp-name span{color:#0d1a2e;}
.cc{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#9aacc4;}
.cc.hv{color:#0d1a2e;}
.cc.goal{color:#15803d;font-size:16px;}

/* STATUS ICONS */
.si{display:inline-block;width:16px;height:16px;vertical-align:middle;}

/* PLATFORM ICONS */
.picons{display:inline-flex;gap:2px;align-items:center;margin-left:3px;vertical-align:middle;}
.picon{display:inline-flex;width:13px;height:13px;border-radius:2px;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}

/* REFRESH BAR */
.refresh-bar{position:fixed;bottom:0;left:0;right:0;height:3px;background:var(--border);z-index:100;}
.refresh-progress{height:100%;background:linear-gradient(90deg,var(--ford-blue),var(--ford-blue-light));width:0%;transition:width linear;}

/* LOADING */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px;color:var(--text-dim);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--ford-blue);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<script>
const TOKEN='patR2mybNVlbt3ueY.0594df073ad93cb2ae53adfa65e2d99ed44cbe82f338e4960a5ce93e18e0bec7';

const REFRESH=60;
// ─── WEEKLY GOAL OVERRIDE ───
// Set to a number (e.g. 7) to base status on WEEK count instead of TODAY count
// Set to 0 for normal mode (status based on today's count)
const WEEKLY_GOAL = 7;

const TEAM_ORDER=['New Team A','New Team B','New Team C','New Team D','Used Team A','Used Team B','Used Team C','Internet Team A'];

async function fetchAll(tbl){
  let recs=[],offset=null;
  do{
    let url=`https://api.airtable.com/v0/${BASE}/${tbl}?pageSize=100`;
    if(offset)url+=`&offset=${offset}`;
    const r=await fetch(url,{headers:{Authorization:`Bearer ${TOKEN}`}});
    const d=await r.json();
    recs=recs.concat(d.records||[]);
    offset=d.offset||null;
  }while(offset);
  return recs;
}



function platformIcons(platforms){
  if(!platforms||!platforms.size)return '';
  let html='<span class="picons">';
  if(platforms.has('YouTube'))  html+=`<span class="picon" title="YouTube"><svg viewBox="0 0 13 13" width="13" height="13"><rect width="13" height="13" fill="#FF0000" rx="2"/><path d="M5 4l4 2.5L5 9z" fill="white"/></svg></span>`;
  if(platforms.has('TikTok'))   html+=`<span class="picon" title="TikTok"><svg viewBox="0 0 13 13" width="13" height="13"><rect width="13" height="13" fill="#010101" rx="2"/><path d="M8.5 2.5c.1.8.6 1.4 1.5 1.6v1.1c-.5 0-1-.2-1.5-.5v2.8c0 1.3-1 2.3-2.3 2.3s-2.3-1-2.3-2.3 1-2.3 2.3-2.3c.1 0 .3 0 .4.1V6.4c-.1 0-.3-.1-.4-.1-.7 0-1.2.5-1.2 1.2s.5 1.2 1.2 1.2 1.2-.5 1.2-1.2V2.5h1.1z" fill="white"/></svg></span>`;
  if(platforms.has('Facebook'))  html+=`<span class="picon" title="Facebook"><svg viewBox="0 0 13 13" width="13" height="13"><rect width="13" height="13" fill="#1877F2" rx="2"/><path d="M8 4.5H7c-.3 0-.4.1-.4.4v.8H8l-.2 1.2H6.6V10H5.4V6.9H4.5V5.7h.9V4.8C5.4 3.8 6 3.2 7 3.2c.4 0 1 .1 1 .1v1.2z" fill="white"/></svg></span>`;
  if(platforms.has('Instagram')) html+=`<span class="picon" title="Instagram"><svg viewBox="0 0 13 13" width="13" height="13"><defs><linearGradient id="ig" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#FCAF45"/><stop offset="50%" stop-color="#FD1D1D"/><stop offset="100%" stop-color="#833AB4"/></linearGradient></defs><rect width="13" height="13" fill="url(#ig)" rx="2"/><rect x="3" y="3" width="7" height="7" rx="2" fill="none" stroke="white" stroke-width="1.2"/><circle cx="6.5" cy="6.5" r="1.8" fill="none" stroke="white" stroke-width="1.1"/><circle cx="9.2" cy="3.8" r="0.6" fill="white"/></svg></span>`;
  html+='</span>';
  return html;
}

function statusIcon(s){
  if(s==='goal') return '<svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="13" fill="#16a34a"/><path d="M7.5 14L11.5 18L20.5 8.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>';
  if(s==='warn') return '<svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="13" fill="#ea580c"/><text x="14" y="20" text-anchor="middle" font-size="16" font-weight="900" font-family="Arial Black,Arial,sans-serif" fill="white">1</text></svg>';
  if(s==='miss') return '<svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="13" fill="#dc2626"/><path d="M9 9L19 19M19 9L9 19" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>';
  return '<svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="13" fill="none" stroke="#d1d5db" stroke-width="1.5"/></svg>';
}
function getSt(s){
  if(!s)return 'none';
  if(s.includes('✅'))return 'goal';
  if(s.includes('⚠') || s.includes('⚠️'))return 'warn';
  if(s.includes('❌'))return 'miss';
  // fallback: check today count context
  return 'none';
}

async function loadData(){
  const [mRecs,pRecs,vRecs]=await Promise.all([fetchAll(M_TBL),fetchAll(P_TBL),fetchAll(V_TBL)]);

  // Build people map
  const pMap={};
  const asmNames=new Set();
  pRecs.forEach(p=>{
    const n=p.fields['Official Name']||'';
    const tl=p.fields['Team Leader']||'';
    pMap[n]={url:p.fields['YouTube Channel URL']||'',team:p.fields['Team']||'Unassigned',manager:p.fields['Manager']||'',asm:tl};
  });
  // Build set of ASM names — anyone who appears as a Team Leader value in any record
  pRecs.forEach(p=>{
    const tl=p.fields['Team Leader']||'';
    if(tl) asmNames.add(tl.trim());
  });
  // Also check: if this person's own name matches a team leader value anywhere = they are an ASM
  // This catches cases where the field stores the name but lookup doesn't match exactly
  // Get all unique team leader values
  const allTeamLeaders=new Set();
  pRecs.forEach(p=>{ const tl=(p.fields['Team Leader']||'').trim(); if(tl) allTeamLeaders.add(tl); });
  // Any person whose Official Name is in the team leader set = ASM
  pRecs.forEach(p=>{ const n=(p.fields['Official Name']||'').trim(); if(allTeamLeaders.has(n)) asmNames.add(n); });

  // Build today's platform submissions per salesperson name
  // Use Arizona time (UTC-7) for "today"
  const nowAZ=new Date(new Date().getTime()-(7*60*60*1000));
  const todayStr=nowAZ.toISOString().slice(0,10);
  const todayPlatforms={};
  vRecs.forEach(v=>{
    const subDate=v.fields['Submission Date']||'';
    if(!subDate)return;
    const subAZ=new Date(new Date(subDate).getTime()-(7*60*60*1000));
    const subStr=subAZ.toISOString().slice(0,10);
    if(subStr!==todayStr)return;
    // Get salesperson name via linked record
    const spLinks=v.fields['Salesperson'];
    if(!spLinks||!spLinks.length)return;
    const platform=v.fields['Platform']||'Unknown';
    // Map record ID to name
    const spId=spLinks[0];
    if(!todayPlatforms[spId])todayPlatforms[spId]=new Set();
    todayPlatforms[spId].add(platform);
  });

  // Build record ID to name map for platform lookup
  const idToName={};
  pRecs.forEach(p=>{ idToName[p.id]=p.fields['Official Name']||''; });
  const namePlatforms={};
  Object.entries(todayPlatforms).forEach(([id,plats])=>{
    const name=idToName[id];
    if(name)namePlatforms[name]=plats;
  });

  // Group metrics by team
  const grouped={};
  TEAM_ORDER.forEach(t=>grouped[t]=[]);
  mRecs.forEach(r=>{
    const name=r.fields['Name']||'';
    // Skip ASMs — they manage teams, don't post videos
    if(asmNames.has(name)) return;
    const p=pMap[name]||{};
    const team=p.team||'Unassigned';
    if(!grouped[team])grouped[team]=[];
    const today=parseInt(r.fields['Today Count']||0);
    const week=parseInt(r.fields['Week Count']||0);
    grouped[team].push({name,url:p.url,manager:p.manager,asm:p.asm,today,week,month:parseInt(r.fields['Month Count']||0),total:parseInt(r.fields['Total Count']||0),status:getSt(r.fields['Status']),platforms:namePlatforms[name]||null});
  });
  TEAM_ORDER.forEach(t=>{if(grouped[t])grouped[t].sort((a,b)=>b.today-a.today||b.week-a.week);});

  // Store totals
  const all=mRecs.map(r=>({today:parseInt(r.fields['Today Count']||0),week:parseInt(r.fields['Week Count']||0),status:getSt(r.fields['Status'])}));
  const totalToday=all.reduce((s,p)=>s+p.today,0);
  const totalWeek=all.reduce((s,p)=>s+p.week,0);
  const onTrack=all.filter(p=>(WEEKLY_GOAL>0?parseInt(p.week||0)>=WEEKLY_GOAL:parseInt(p.today||0)>=2)).length;
  const warning=all.filter(p=>(WEEKLY_GOAL>0?(parseInt(p.week||0)>0&&parseInt(p.week||0)<WEEKLY_GOAL):(parseInt(p.today||0)===1))).length;
  const notStarted=all.filter(p=>(WEEKLY_GOAL>0?parseInt(p.week||0)===0:(parseInt(p.today||0)===0))).length;
  const weekGoal=46*10;
  const weekPct=Math.min(Math.round((totalWeek/weekGoal)*100),100);


  let leader=null;

  // Hot list (not posted)
  const hotList=[];
  mRecs.filter(r=>getSt(r.fields['Status'])==='miss').forEach(r=>{
    const name=r.fields['Name']||'';
    const p=pMap[name]||{};
    hotList.push({name,team:p.team||''});
  });
  hotList.sort((a,b)=>a.team.localeCompare(b.team));

  const now=new Date().toLocaleString('en-US',{timeZone:'America/Phoenix',weekday:'long',month:'long',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});

  // Build teams HTML
  let teamsHTML='';
  TEAM_ORDER.forEach(team=>{
    const members=grouped[team]||[];
    if(!members.length)return;
    const mgr=members[0].manager||'';
    const asm=members[0].asm||'';
    const tT=members.reduce((s,m)=>s+m.today,0);
    const tW=members.reduce((s,m)=>s+m.week,0);
    const tM=members.reduce((s,m)=>s+m.month,0);
    const rows=members.map(m=>{
      const rowClass=m.status==='goal'?'row-goal':m.status==='warn'?'row-warn':'row-miss';
      const nameHTML=m.url?`<a href="${m.url}" target="_blank">${m.name}</a>`:`<span>${m.name}</span>`;
      const todayClass=m.today>=2?'cc goal':m.today>0?'cc hv':'cc';
      const picons=platformIcons(m.platforms);
      return `<tr class="${rowClass}"><td class="sp-name">${nameHTML}${picons}</td><td class="tc"><span class="${todayClass}">${m.today}</span></td><td class="tc"><span class="cc ${m.week>0?'hv':''}">${m.week}</span></td><td class="tc"><span class="cc ${m.month>0?'hv':''}">${m.month}</span></td><td class="tc"><span class="cc ${m.total>0?'hv':''}">${m.total}</span></td><td class="tc">${statusIcon(m.status)}</td></tr>`;
    }).join('');
    const mgrLine=mgr?`Mgr: ${mgr}${asm?' · ASM: '+asm:''}`:asm?`ASM: ${asm}`:'';
    const onGoalCount=members.filter(m=>m.today>=2).length;
    const totalCount=members.length;
    const badgeColor=onGoalCount===totalCount?'#16a34a':onGoalCount===0?'#dc2626':'#ea580c';
    const badgeHTML=`<span style="display:inline-flex;align-items:center;justify-content:center;background:${badgeColor};color:white;font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px;margin-left:8px;letter-spacing:0.5px;">${onGoalCount}/${totalCount}</span>`;
    teamsHTML+=`<div class="team-card"><div class="team-header"><div><div class="team-name">${team}${badgeHTML}</div>${mgrLine?`<div class="team-meta">${mgrLine}</div>`:''}</div><div class="team-totals"><span>Today <strong>${tT}</strong></span><span>Week <strong>${tW}</strong></span><span>Month <strong>${tM}</strong></span></div></div><table class="tt"><thead><tr><th>Salesperson</th><th class="tc">Today</th><th class="tc">Week</th><th class="tc">Month</th><th class="tc">Total</th><th class="tc">Status</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  });

  // Hot list HTML
  const azDay=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Phoenix'})).getDay();
  const isRequiredDay=azDay>=0&&azDay<=4;
  const hotHTML=isRequiredDay&&hotList.length?`<div class="hot-list"><div class="hot-list-header"><div class="hot-list-title">&#9888; Not Posted Today &mdash; ${hotList.length} ${hotList.length===1?'person':'people'}</div></div><div class="hot-pills">${hotList.map(p=>`<span class="hot-pill">${p.name}</span>`).join('')}</div></div>`:'';

  const leaderHTML='';

  document.getElementById('mainContent').innerHTML=`
    <div class="store-summary">
      <div class="summary-card total"><div class="big-number">${totalToday}</div><div class="card-label">Videos Today</div><div class="card-sub">Goal: 2 per person</div></div>
      <div class="summary-card on-track"><div class="big-number">${onTrack}</div><div class="card-label">On Goal</div><div class="card-sub">${WEEKLY_GOAL>0?WEEKLY_GOAL+'+ videos this week':'2+ videos today'}</div></div>
      <div class="summary-card warning"><div class="big-number">${warning}</div><div class="card-label">In Progress</div><div class="card-sub">${WEEKLY_GOAL>0?'1–'+(WEEKLY_GOAL-1)+' videos this week':'1 video today'}</div></div>
      <div class="summary-card not-started"><div class="big-number">${notStarted}</div><div class="card-label">Not Started</div><div class="card-sub">${WEEKLY_GOAL>0?'0 videos this week':'0 videos today'}</div></div>
    </div>
    <div style="padding:0 24px 10px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <div style="font-size:11px;color:var(--text-dim);">Week total: <strong style="color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:15px;">${totalWeek}</strong> <span style="color:var(--text-muted)">of ${weekGoal} goal</span></div>
        <div style="flex:1;min-width:120px;max-width:260px;"><div class="week-bar-wrap"><div class="week-bar" style="width:${weekPct}%;background:${weekPct>=80?'#16a34a':weekPct>=50?'#ea580c':'#dc2626'}"></div></div></div>
        <div style="font-size:11px;color:var(--text-dim);">${weekPct}% of weekly goal</div>
      </div>
    </div>
    ${hotHTML}
    ${leaderHTML}
    <div class="date-bar">
      <strong>${now}</strong>
      <div class="goal-pills">
        <span class="goal-pill">2 videos/day</span>
        <span class="goal-pill">10 videos/week</span>
        <span class="goal-pill">Sun &ndash; Thu</span>
        <span class="goal-pill">Refreshes every 60s</span>
      </div>
    </div>
    <div class="teams-grid">${teamsHTML}</div>`;

  document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString('en-US',{timeZone:'America/Phoenix',hour:'numeric',minute:'2-digit',hour12:true})+' AZ';
}

function startBar(){
  const b=document.getElementById('refreshProgress');
  b.style.transition='none';b.style.width='0%';
  setTimeout(()=>{b.style.transition=`width ${REFRESH}s linear`;b.style.width='100%';},50);
}
async function refresh(){try{await loadData();}catch(e){console.error(e);}startBar();}
refresh();
setInterval(refresh,REFRESH*1000);
</script>
</body>
</html>
